# Jobs run sequentially (no `parallel: true`) so lint --fix and format --write
# don't race on the same staged files.
pre-commit:
  jobs:
    - name: lint
      glob: "*.{ts,tsx,vue,mjs,cjs,mts,cts}"
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true

    - name: format
      glob: "*.{ts,tsx,vue,mjs,cjs,mts,cts,js,json}"
      run: bunx oxfmt --write {staged_files}
      stage_fixed: true

    - name: knip
      run: bunx knip --no-progress

pre-push:
  parallel: true
  jobs:
    - name: test
      run: bun run test:unit -- --run
