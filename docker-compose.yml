services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: termina
      POSTGRES_PASSWORD: termina
      POSTGRES_DB: termina
    # Host port remapped off the default 5432 so termina's Postgres can run
    # alongside another project's DB. Override with TERMINA_POSTGRES_PORT if 5433
    # is also taken. Container-internal port stays 5432.
    ports:
      - '${TERMINA_POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    # Host port remapped off the default 6379 (override with TERMINA_REDIS_PORT).
    ports:
      - '${TERMINA_REDIS_PORT:-6380}:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
