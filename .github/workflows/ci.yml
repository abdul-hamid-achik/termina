name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (safe for CI; never for ordered deploys).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege floor. read-packages lets the optional GHCR mirror path (and
# any future GITHUB_TOKEN-authenticated pulls) work; widen per-job if ever needed.
permissions:
  contents: read
  packages: read

env:
  # Integration tests (tests/helpers/test-db.ts) read TEST_DATABASE_URL; drizzle-kit
  # reads DATABASE_URL. Both point at the CI Postgres published on localhost:5432.
  TEST_DATABASE_URL: postgresql://termina:termina@localhost:5432/termina_test
  DATABASE_URL: postgresql://termina:termina@localhost:5432/termina_test
  # Single source of truth for the runtime + image tags used across jobs.
  BUN_VERSION: '1.3.13'
  POSTGRES_IMAGE: postgres:17-alpine
  REDIS_IMAGE: redis:8-alpine

jobs:
  # ─────────────────────────── tier 1: cheap static checks (parallel, no services) ───
  lint:
    name: lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Lint (oxlint)
        run: bun run lint

  format:
    name: format (oxfmt --check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Format check (oxfmt --check)
        run: bun run format:check

  typecheck:
    name: typecheck (vue-tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Typecheck (nuxt typecheck / vue-tsc)
        run: bun run typecheck

  knip:
    name: knip (dead-code)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Dead-code check (knip)
        run: bun run knip

  unit-tests:
    name: unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Unit tests (vitest, node env)
        run: bun run test:unit

  component-tests:
    name: component tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Component tests (vitest, happy-dom)
        run: bun run test:components

  gameplay-tests:
    name: gameplay tests (in-process engine)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      # The in-process gameplay harness drives the real engine (seed scenario →
      # act → advance ticks → assert GameState) with NO browser/server/DB, so it's
      # a fast tier-1 job AND the first REQUIRED gate job that plays game
      # situations (the browser e2e is still advisory).
      - name: Gameplay harness (vitest, in-process engine)
        run: bun run test:gameplay

  # ─────────────────────────── tier 2: needs Postgres+Redis (resilient pulls) ────────
  # Runs the full vitest suite under coverage (integration + everything else), so
  # it also owns threshold enforcement — the old separate `coverage` job is folded
  # in here to avoid a second PG+Redis bootstrap + schema push.
  integration-tests:
    name: integration + coverage (vitest v8 + postgres)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      # Postgres + Redis via the shared composite action (retryable pulls, not
      # `services:`). See .github/actions/pg-redis for the rationale + the Docker
      # Hub auth escape hatch.
      - uses: ./.github/actions/pg-redis
        with:
          postgres-image: ${{ env.POSTGRES_IMAGE }}
          redis-image: ${{ env.REDIS_IMAGE }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Push schema into the test DB
        run: bunx drizzle-kit push --force
      # This job runs the FULL vitest suite under v8 coverage (all projects need
      # PG+Redis anyway), folding the old standalone advisory `coverage` job in —
      # one PG+Redis bootstrap + one schema push instead of two, and the
      # vitest.config.ts thresholds now gate the merge instead of being advisory.
      - name: Integration + coverage (vitest v8 — enforces thresholds)
        run: bun run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 14
          if-no-files-found: ignore

  # ─────────────────────────── tier 2: build (parallel with integration) ─────────────
  build:
    name: build (nuxt)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Build (nuxt build)
        run: bun run build

  # ─────────────────────────── advisory: infra (Pulumi) typecheck ─────────────────────
  # The Pulumi deploy program in infra/ has its own deps + tsconfig and is excluded
  # from the app typecheck, so compile it here — a type error in the deploy code is
  # caught in CI rather than at `pulumi up`. npm-managed (Pulumi project). Advisory
  # for now (NOT in ci-success); promote into ci-success.needs once trusted.
  infra-typecheck:
    name: infra typecheck (pulumi tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - name: Install infra deps
        run: npm ci
        working-directory: infra
      - name: Typecheck the Pulumi program (tsc --noEmit)
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: infra

  # ─────────────────────────── advisory: stories + coverage (NOT in ci-success) ──────
  # Same advisory posture as e2e: they run and report red/green + upload artifacts,
  # but do NOT block the merge gate. Promote into ci-success.needs once trusted.
  stories:
    name: stories (histoire build)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Build the Histoire story catalog (advisory — surfaces broken stories)
        run: bun run story:build
      - name: Upload built stories
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: histoire-stories
          path: .histoire/dist/**
          retention-days: 14
          if-no-files-found: ignore

  # (The old standalone `coverage` job was folded into `integration-tests` above —
  # it ran the identical vitest projects with a second PG+Redis bootstrap + schema
  # push. Coverage thresholds are now enforced there as part of the merge gate.)

  # ─────────────────────────── tier 3: browser e2e (Cairntrace) ──────────────────────
  # Needs cairn (not on npm → install from the public GitHub repo) + Chromium for the
  # playwright backend. Gated on the cheap checks so a flaky browser/install can't mask
  # core failures. Uploads run artifacts on every outcome for headless debugging.
  e2e:
    name: e2e (cairntrace, chromium)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, build]
    # cairntrace's webServer (config) builds + boots the prod preview, and cairn
    # enforces per-step timeouts; this 30-min job cap is the hard backstop so the
    # job can never sit hung for the full 6h GitHub limit. Backend + --parallel 3
    # live in the test:e2e:ci script.
    timeout-minutes: 30
    env:
      # The webServer block in tests/e2e/cairntrace.config.yml pins HOST/PORT,
      # TERMINA_TEST_HOOKS, TERMINA_TEST_FAST_GAME, NUXT_SESSION_*, and the db1
      # NUXT_REDIS_URL. The ONE thing it intentionally inherits is the DB URL, so
      # CI points the server it spawns at termina_test here.
      NUXT_DATABASE_URL: postgresql://termina:termina@localhost:5432/termina_test
    steps:
      - uses: actions/checkout@v5

      # Postgres + Redis via the shared composite action (retryable pulls).
      - uses: ./.github/actions/pg-redis
        with:
          postgres-image: ${{ env.POSTGRES_IMAGE }}
          redis-image: ${{ env.REDIS_IMAGE }}

      # Flush test Redis (DB 1) so a previous run's zombie games don't leak in.
      # (Belt-and-braces: the webServer `command` also flushes db1 just before it
      # boots — but redis-cli may not exist on the runner host, so do it in-container
      # here too.)
      - name: Flush test Redis (DB 1)
        run: docker exec redis redis-cli -n 1 flushdb

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Install the cairn CLI (Cairntrace is not published to npm)
        run: bun add --global github:abdul-hamid-achik/cairntrace

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium
          restore-keys: ${{ runner.os }}-playwright-
      - name: Install Chromium for the playwright backend
        run: bunx playwright install --with-deps chromium

      - name: Push schema into the test DB
        run: bunx drizzle-kit push --force

      # cairn's webServer block builds (bun run build) + boots the prod preview
      # itself, so there is no separate build/boot step here anymore.
      - name: Run the e2e suite (cairn builds + boots the server, then runs flows)
        run: bun run test:e2e:ci

      - name: Upload Cairntrace run artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-runs
          path: tests/e2e/runs/**
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-junit
          path: '**/junit*.xml'
          retention-days: 14
          if-no-files-found: ignore

  # ─────────────────────────── advisory: API contract tests (hitspec) ─────────────────
  # hitspec (the user's own tool: github.com/abdul-hamid-achik/hitspec) is distributed
  # via a Homebrew tap, NOT npm — so install the GoReleaser linux binary from the GitHub
  # release. Boots the prod server in the background (TERMINA_DISABLE_RATE_LIMIT so the
  # collections can mint users from one IP) and runs the .http contracts against it.
  # Advisory for now (not in ci-success) — promote once it's green on CI hardware.
  api-tests:
    name: api tests (hitspec)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, build]
    timeout-minutes: 20
    env:
      HITSPEC_VERSION: '2.14.1'
      NUXT_DATABASE_URL: postgresql://termina:termina@localhost:5432/termina_test
      NUXT_REDIS_URL: redis://localhost:6379/1
      NUXT_SESSION_PASSWORD: ci_session_password_at_least_32_chars_long
      NUXT_SESSION_COOKIE_SECURE: 'false'
      TERMINA_TEST_HOOKS: '1'
      TERMINA_DISABLE_RATE_LIMIT: '1'
      HOST: 127.0.0.1
      PORT: '3000'
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/pg-redis
        with:
          postgres-image: ${{ env.POSTGRES_IMAGE }}
          redis-image: ${{ env.REDIS_IMAGE }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Install hitspec (GoReleaser linux binary from the GitHub release)
        run: |
          set -euo pipefail
          url="https://github.com/abdul-hamid-achik/hitspec/releases/download/v${HITSPEC_VERSION}/hitspec_${HITSPEC_VERSION}_linux_amd64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL "$url" | tar -xz -C "$tmp"
          mkdir -p "$HOME/.local/bin"
          install -m755 "$(find "$tmp" -name hitspec -type f | head -1)" "$HOME/.local/bin/hitspec"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/hitspec" --version

      - name: Push schema into the test DB
        run: bunx drizzle-kit push --force
      - name: Build the app (hitspec runs against the prod server)
        run: bun run build

      - name: Boot the server, run hitspec, tear it down
        run: |
          set -uo pipefail
          node .output/server/index.mjs > /tmp/api-server.log 2>&1 &
          SRV=$!
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:3000/" >/dev/null 2>&1 && { echo "server up after ${i}s"; break; }
            sleep 1
          done
          bun run test:api
          code=$?
          kill "$SRV" 2>/dev/null || true
          exit $code
      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: api-server-log
          path: /tmp/api-server.log
          retention-days: 14
          if-no-files-found: ignore

  # ─────────────────────────── aggregate: one stable required check ──────────────────
  # Make THIS the single required status check in branch protection. It lets you evolve
  # the internal job graph without editing protection rules. Fails if any needed job
  # failed OR was cancelled (a skipped dependency would otherwise let `success()` pass).
  #
  # NOTE: `e2e` and `stories` are intentionally NOT in this list — they run and
  # report their own red/green (and upload artifacts) but do NOT block the merge
  # gate yet. Promote one by adding it to `needs` below once it's consistently green
  # in CI (e2e is still being stabilized on CI hardware). Coverage is no longer a
  # separate advisory job — it's folded into `integration-tests`, so its thresholds
  # now gate. `gameplay-tests` (in-process engine) is required: it's fast and has no
  # browser/server flakiness, so it gates from day one.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - format
      - typecheck
      - knip
      - unit-tests
      - component-tests
      - gameplay-tests
      - integration-tests
      - build
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::one or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "all CI jobs succeeded"

