name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (safe for CI; never for ordered deploys).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege floor; widen per-job if ever needed.
permissions:
  contents: read
  packages: read

env:
  # Integration tests (tests/helpers/test-db.ts) read TEST_DATABASE_URL; drizzle-kit
  # reads DATABASE_URL. Both point at the CI Postgres published on localhost:5432.
  TEST_DATABASE_URL: postgresql://termina:termina@localhost:5432/termina_test
  DATABASE_URL: postgresql://termina:termina@localhost:5432/termina_test
  # Single source of truth for the Bun runtime + service image tags across jobs.
  BUN_VERSION: '1.3.13'
  POSTGRES_IMAGE: postgres:17-alpine
  REDIS_IMAGE: redis:8-alpine

# Every Bun job opens with `actions/checkout` + the `./.github/actions/bun-setup`
# composite (pinned Bun + cached `bun install --frozen-lockfile`). Service jobs add
# `./.github/actions/pg-redis` (Postgres+Redis via retryable docker run).

jobs:
  # ── tier 1: cheap static checks + fast tests (parallel, no services) ──────────
  lint:
    name: lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run lint

  format:
    name: format (oxfmt --check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run format:check

  typecheck:
    name: typecheck (vue-tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run typecheck

  knip:
    name: knip (dead-code)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run knip

  unit-tests:
    name: unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run test:unit

  component-tests:
    name: component tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run test:components

  gameplay-tests:
    name: gameplay tests (in-process engine)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # In-process engine truth (seed → act → advance ticks → assert GameState),
      # no browser/server/DB. The first REQUIRED gate job that plays game
      # situations — browser e2e stays advisory.
      - run: bun run test:gameplay

  # ── tier 2: needs Postgres+Redis ──────────────────────────────────────────────
  # Runs the full vitest suite under v8 coverage, so it also ENFORCES the coverage
  # thresholds (the old standalone `coverage` job folded in — one PG+Redis bootstrap).
  integration-tests:
    name: integration + coverage (vitest v8 + postgres)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/pg-redis
        with:
          postgres-image: ${{ env.POSTGRES_IMAGE }}
          redis-image: ${{ env.REDIS_IMAGE }}
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Push schema into the test DB
        run: bunx drizzle-kit push --force
      - name: Integration + coverage (vitest v8 — enforces thresholds)
        run: bun run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/**
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: build (nuxt)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run build

  # ── advisory: infra (Pulumi) typecheck — npm-managed, own tsconfig ────────────
  # A type error in the deploy program is caught here, not at `pulumi up`. Advisory
  # (NOT in ci-success); promote once trusted.
  infra-typecheck:
    name: infra typecheck (pulumi tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - name: Install infra deps
        run: npm ci
        working-directory: infra
      - name: Typecheck the Pulumi program (tsc --noEmit)
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: infra

  # ── advisory: histoire story catalog (NOT in ci-success) ──────────────────────
  stories:
    name: stories (histoire build)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Build the Histoire story catalog (advisory — surfaces broken stories)
        run: bun run story:build
      - name: Upload built stories
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: histoire-stories
          path: .histoire/dist/**
          retention-days: 14
          if-no-files-found: ignore

  # Browser e2e (cairntrace) is intentionally NOT run in CI: under the shared
  # prod-preview server it accumulates game loops and gets resource-starved/flaky,
  # and it's slow. Run it locally instead: `bun run test:e2e`. Engine/match truth
  # is covered by `tests/gameplay/` (in-process), API contracts by `api-tests`.

  # ── advisory: API contract tests (hitspec — GoReleaser binary, not npm) ───────
  api-tests:
    name: api tests (hitspec)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, build]
    timeout-minutes: 20
    env:
      HITSPEC_VERSION: '2.14.1'
      NUXT_DATABASE_URL: postgresql://termina:termina@localhost:5432/termina_test
      NUXT_REDIS_URL: redis://localhost:6379/1
      NUXT_SESSION_PASSWORD: ci_session_password_at_least_32_chars_long
      NUXT_SESSION_COOKIE_SECURE: 'false'
      TERMINA_TEST_HOOKS: '1'
      TERMINA_DISABLE_RATE_LIMIT: '1'
      HOST: 127.0.0.1
      PORT: '3000'
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/pg-redis
        with:
          postgres-image: ${{ env.POSTGRES_IMAGE }}
          redis-image: ${{ env.REDIS_IMAGE }}
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install hitspec (GoReleaser linux binary from the GitHub release)
        run: |
          set -euo pipefail
          url="https://github.com/abdul-hamid-achik/hitspec/releases/download/v${HITSPEC_VERSION}/hitspec_${HITSPEC_VERSION}_linux_amd64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL "$url" | tar -xz -C "$tmp"
          mkdir -p "$HOME/.local/bin"
          install -m755 "$(find "$tmp" -name hitspec -type f | head -1)" "$HOME/.local/bin/hitspec"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/hitspec" --version
      - name: Push schema into the test DB
        run: bunx drizzle-kit push --force
      - name: Build the app (hitspec runs against the prod server)
        run: bun run build
      - name: Boot the server, run hitspec, tear it down
        run: |
          set -uo pipefail
          node .output/server/index.mjs > /tmp/api-server.log 2>&1 &
          SRV=$!
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:3000/" >/dev/null 2>&1 && { echo "server up after ${i}s"; break; }
            sleep 1
          done
          bun run test:api
          code=$?
          kill "$SRV" 2>/dev/null || true
          exit $code
      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: api-server-log
          path: /tmp/api-server.log
          retention-days: 14
          if-no-files-found: ignore

  # ── aggregate: the single required branch-protection check ────────────────────
  # Keep THIS as the only required status check — it lets the internal job graph
  # change without editing protection rules. Fails if any needed job failed OR was
  # cancelled. e2e / stories / api-tests / infra-typecheck are advisory (not listed);
  # promote one by adding it below once it's consistently green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - format
      - typecheck
      - knip
      - unit-tests
      - component-tests
      - gameplay-tests
      - integration-tests
      - build
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::one or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "all CI jobs succeeded"
