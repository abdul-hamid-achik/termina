name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't cancel mid-deploy — ordered deploys can't safely overlap.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Vercel (the frontend SPA) deploys itself via its native GitHub integration, so
# this workflow owns only what Vercel can't: the DigitalOcean game server
# (Docker image → DOCR → Pulumi). Keeping them separate avoids double-deploying
# the frontend. The frontend's NUXT_PUBLIC_API_URL / NUXT_PUBLIC_WS_URL live in
# Vercel's own project env, not here.
permissions:
  contents: read

jobs:
  # Gate on the CI workflow passing — don't deploy a red build.
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status on main
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              status: 'completed',
              per_page: 50,
            })
            const ciRuns = runs.data.check_runs.filter(r => r.name.startsWith('CI '))
            if (ciRuns.length === 0) throw new Error('No CI checks found for this SHA')
            const failed = ciRuns.filter(r => r.conclusion === 'failure' || r.conclusion === 'cancelled')
            if (failed.length > 0) {
              throw new Error(`CI not green: ${failed.map(r => r.name).join(', ')}`)
            }
            core.info(`CI green — ${ciRuns.length} checks passed`)

  # ── DigitalOcean: build the Docker image and push to DO Container Registry ──
  do-build:
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login

      - name: Build and push the WS server image
        id: build
        run: |
          # Tag with the short SHA + latest.
          IMAGE="registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:latest
          docker push "$IMAGE"
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:latest
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # ── Deploy via Pulumi; secrets from tvault (identity mode) ──────────────
      # State lives in a self-managed DO Spaces backend pinned in infra/Pulumi.yaml.
      # Deploy secrets (DIGITALOCEAN_TOKEN, AWS_* Spaces keys, PULUMI_CONFIG_PASSPHRASE,
      # NUXT_*) come from a recipient-sealed infra/.env.encrypted (sealed to the `ci`
      # tvault identity via `tvault seal`). CI holds only TVAULT_IDENTITY_KEY — no
      # per-secret GitHub secrets, no vault passphrase. The `prod` stack must be
      # initialized once locally (`pulumi stack init prod`) before the first CI deploy.
      - name: Set up Node for the Pulumi program
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install tvault
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://api.github.com/repos/abdul-hamid-achik/tinyvault/releases/latest \
            | grep -oE '"tag_name": *"v[^"]+"' | grep -oE '[0-9.]+' | head -1)
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/abdul-hamid-achik/tinyvault/releases/download/v${ver}/tvault_${ver}_linux_amd64.tar.gz" | tar -xz -C "$tmp"
          mkdir -p "$HOME/.local/bin"
          install -m755 "$(find "$tmp" -name tvault -type f | head -1)" "$HOME/.local/bin/tvault"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/tvault" --version

      - name: Deploy with Pulumi (DO App Platform)
        working-directory: infra
        env:
          TVAULT_IDENTITY_KEY: ${{ secrets.TVAULT_IDENTITY_KEY }}
        run: |
          set -uo pipefail
          # Decrypt the recipient-sealed deploy secrets with the CI identity (no
          # passphrase), load them into this step's env, then shred the plaintext.
          tvault open --in .env.encrypted --out .env
          set -a; . ./.env; set +a
          rm -f .env
          curl -fsSL https://get.pulumi.com | sh
          export PATH="$HOME/.pulumi/bin:$PATH"
          npm ci
          pulumi stack select prod
          pulumi config set termina-infra:imageTag "$GITHUB_SHA"   # deploy the image just pushed
          pulumi up --yes