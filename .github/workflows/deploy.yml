name: Deploy

# Runs ONLY after the CI workflow completes on main. `workflow_run` fires when
# CI *finishes*, so we read its real conclusion — instead of the old push-time
# gate that queried for "completed" CI checks the instant the push landed, before
# CI had even started (it could never find them, so it always failed). Manual
# runs via workflow_dispatch are always allowed.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Don't cancel mid-deploy — ordered deploys can't safely overlap.
concurrency:
  group: deploy-main
  cancel-in-progress: false

# Vercel (the frontend SPA) deploys itself via its native GitHub integration, so
# this workflow owns only what Vercel can't: the DigitalOcean game server
# (Docker image -> DOCR -> Pulumi). The frontend's NUXT_PUBLIC_API_URL /
# NUXT_PUBLIC_WS_URL live in Vercel's own project env, not here.
permissions:
  contents: read

jobs:
  # ── DigitalOcean: build the image, push to DOCR, deploy via Pulumi ──────────
  # Gated two ways:
  #   1) CI passed (or this is a manual dispatch), AND
  #   2) the repo variable DEPLOY_ENABLED == 'true'. Set that variable once the
  #      deploy secrets exist (TVAULT_IDENTITY_KEY, DIGITALOCEAN_ACCESS_TOKEN,
  #      DO_REGISTRY_NAME) and the `prod` Pulumi stack has been initialized once
  #      locally. Until then this job SKIPS, so the Deploy run stays neutral/green
  #      instead of failing red on missing secrets.
  do-build:
    if: >-
      vars.DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    env:
      # The exact commit CI validated. Under workflow_run, GITHUB_SHA is the
      # default-branch tip (which may have advanced past what CI ran on), so
      # prefer the triggering run's head_sha.
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login

      - name: Build and push the WS server image
        run: |
          IMAGE="registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:${DEPLOY_SHA}"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:latest
          docker push "$IMAGE"
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:latest

      # ── Deploy via Pulumi; secrets from tvault (identity mode) ──────────────
      # State lives in a self-managed DO Spaces backend pinned in infra/Pulumi.yaml.
      # Deploy secrets (DIGITALOCEAN_TOKEN, AWS_* Spaces keys, PULUMI_CONFIG_PASSPHRASE,
      # NUXT_*) come from a recipient-sealed infra/.env.encrypted (sealed to the `ci`
      # tvault identity via `tvault seal`). CI holds only TVAULT_IDENTITY_KEY — no
      # per-secret GitHub secrets, no vault passphrase. The `prod` stack must be
      # initialized once locally (`pulumi stack init prod`) before the first CI deploy.
      - name: Set up Node for the Pulumi program
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install tvault
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://api.github.com/repos/abdul-hamid-achik/tinyvault/releases/latest \
            | grep -oE '"tag_name": *"v[^"]+"' | grep -oE '[0-9.]+' | head -1)
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/abdul-hamid-achik/tinyvault/releases/download/v${ver}/tvault_${ver}_linux_amd64.tar.gz" | tar -xz -C "$tmp"
          mkdir -p "$HOME/.local/bin"
          install -m755 "$(find "$tmp" -name tvault -type f | head -1)" "$HOME/.local/bin/tvault"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/tvault" --version

      - name: Deploy with Pulumi (DO App Platform)
        working-directory: infra
        env:
          TVAULT_IDENTITY_KEY: ${{ secrets.TVAULT_IDENTITY_KEY }}
        run: |
          set -uo pipefail
          # Decrypt the recipient-sealed deploy secrets with the CI identity (no
          # passphrase), load them into this step's env, then shred the plaintext.
          tvault open --in .env.encrypted --out .env
          set -a; . ./.env; set +a
          rm -f .env
          curl -fsSL https://get.pulumi.com | sh
          export PATH="$HOME/.pulumi/bin:$PATH"
          npm ci
          pulumi stack select prod
          pulumi config set termina-infra:imageTag "$DEPLOY_SHA"   # deploy the image just pushed
          pulumi up --yes
