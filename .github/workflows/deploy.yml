name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't cancel mid-deploy — ordered deploys can't safely overlap.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  BUN_VERSION: '1.3.13'

jobs:
  # Gate on the CI workflow passing — don't deploy a red build.
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status on main
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.check.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              status: 'completed',
              per_page: 50,
            })
            const ciRuns = runs.data.check_runs.filter(r => r.name.startsWith('CI '))
            if (ciRuns.length === 0) throw new Error('No CI checks found for this SHA')
            const failed = ciRuns.filter(r => r.conclusion === 'failure' || r.conclusion === 'cancelled')
            if (failed.length > 0) {
              throw new Error(`CI not green: ${failed.map(r => r.name).join(', ')}`)
            }
            core.info(`CI green — ${ciRuns.length} checks passed`)

  # ── DigitalOcean: build the Docker image and push to DO Container Registry ──
  do-build:
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login

      - name: Build and push the WS server image
        id: build
        run: |
          # Tag with the short SHA + latest.
          IMAGE="registry.digitaloceanspaces.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" registry.digitaloceanspaces.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:latest
          docker push "$IMAGE"
          docker push registry.digitaloceanspaces.com/${{ secrets.DO_REGISTRY_NAME }}/termina-ws:latest
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Update the DO App Platform deployment
        if: ${{ secrets.DO_APP_ID != '' }}
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} \
            --spec ./.github/do-app-spec.yaml \
            --wait

  # ── Vercel: deploy the frontend SPA ───────────────────────────────
  vercel-deploy:
    needs: ci-gate
    runs-on: ubuntu-latest
    env:
      # The SPA needs to know where the WS server lives (DO).
      NUXT_PUBLIC_WS_URL: ${{ secrets.NUXT_PUBLIC_WS_URL }}
      NUXT_PUBLIC_API_URL: ${{ secrets.NUXT_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Vercel CLI
        run: bun add -g vercel

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Build the SPA (Vercel build command reads vercel.json)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}