name: 'Postgres + Redis'
description: >
  Start Postgres and Redis as host-published containers with retryable image
  pulls, then wait until both are healthy. Replaces the three byte-identical
  inline blocks that used to live in integration / coverage / e2e. NOT `services:`
  — that can't retry a transient Docker Hub pull/429, which hard-fails the job.
  Requires actions/checkout to have run first (it's a local composite action).

inputs:
  postgres-image:
    description: Postgres image tag (passed in from the workflow env for one source of truth)
    required: true
  redis-image:
    description: Redis image tag
    required: true
  postgres-db:
    description: Database created on first boot
    required: false
    default: termina_test

runs:
  using: composite
  steps:
    - name: Start Postgres + Redis (with pull retry)
      shell: bash
      run: |
        set -euo pipefail
        pull_retry() {
          for i in 1 2 3 4 5; do
            if docker pull "$1"; then return 0; fi
            echo "::warning::docker pull $1 failed (attempt $i), backing off..."
            sleep $((i * 10))
          done
          echo "::error::docker pull $1 failed after 5 attempts"; return 1
        }
        pull_retry "${{ inputs.postgres-image }}"
        pull_retry "${{ inputs.redis-image }}"
        docker run -d --name postgres \
          -e POSTGRES_USER=termina -e POSTGRES_PASSWORD=termina -e POSTGRES_DB=${{ inputs.postgres-db }} \
          -p 5432:5432 \
          --health-cmd "pg_isready -U termina" \
          --health-interval 5s --health-timeout 5s --health-retries 20 \
          "${{ inputs.postgres-image }}"
        docker run -d --name redis \
          -p 6379:6379 \
          --health-cmd "redis-cli ping" \
          --health-interval 5s --health-timeout 5s --health-retries 20 \
          "${{ inputs.redis-image }}"

    - name: Wait for Postgres + Redis to be healthy
      shell: bash
      run: |
        set -euo pipefail
        for svc in postgres redis; do
          echo "waiting for $svc..."
          for _ in $(seq 1 30); do
            status="$(docker inspect -f '{{.State.Health.Status}}' "$svc" 2>/dev/null || echo starting)"
            if [ "$status" = healthy ]; then echo "$svc healthy"; break; fi
            sleep 2
          done
          if [ "$(docker inspect -f '{{.State.Health.Status}}' "$svc")" != healthy ]; then
            echo "::error::$svc did not become healthy"; docker logs "$svc" || true; exit 1
          fi
        done
