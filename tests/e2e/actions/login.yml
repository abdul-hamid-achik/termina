# Reusable cold-start action: mint a dev session via the login-as hook.
# Imported by flows and invoked with `use: login`. Requires the dev test hooks
# (TERMINA_TEST_HOOKS=1) — see the repo README (Testing).
version: 1
name: login
steps:
  # Open the app origin first. v1.8 (B1) makes `request` resolve a relative URL
  # against baseUrl, but an in-page fetch still needs a real same-origin page —
  # a credentialed POST from about:blank fails "Failed to fetch". So the correct
  # authoring pattern remains: establish the origin, then request.
  - id: open_app
    open: { path: /, waitUntil: domcontentloaded }
  - id: login_as_dev
    request:
      method: POST
      url: /api/test/login-as
      body: { username: "${vars.testUser}" }
      expectStatus: 200
      assign: session
      # Bound the in-page fetch: cairn only arms an AbortSignal when timeoutMs is
      # set, so without it a stalled response (seen in CI's dev server) hangs the
      # whole suite until the job watchdog. 15s is ample for a ~100ms hook.
      timeoutMs: 15000
