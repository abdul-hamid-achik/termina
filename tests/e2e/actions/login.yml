version: 1
name: login
# Real auth — NO test hooks. Registers a fresh user through the /login Register
# tab (which logs you in on success). ${run.token} keeps the username unique per
# run + per parallel worker so registrations never collide. Imported with
# `use: login` by flows that need an authenticated session.
steps:
  - id: open_login
    open:
      path: /login
      waitUntil: domcontentloaded
  - id: await_form
    wait:
      text: authenticate to continue
      timeoutMs: 10000
  - id: switch_to_register
    click:
      by: role
      role: button
      name: "> REGISTER"
  - id: fill_username
    fill:
      by: selector
      selector: input[autocomplete="username"]
      value: "${vars.testUser}"
  - id: fill_password
    fill:
      by: selector
      selector: form > div:nth-child(2) input
      value: Testpass123
  - id: fill_confirm
    fill:
      by: selector
      selector: form > div:nth-child(3) input
      value: Testpass123
  # The register form has five buttons (LOGIN/REGISTER tabs, the submit, two OAuth),
  # so target the submit by its exact accessible name — `form button` is ambiguous
  # and resolves to whichever is first (the disabled submit before the form is valid).
  - id: submit_register
    click:
      by: role
      role: button
      name: "[ REGISTER ]"
      exact: true
  # Success = redirected off /login (the login-page prompt disappears).
  - id: await_logged_in
    wait:
      notText: authenticate to continue
      timeoutMs: 15000
