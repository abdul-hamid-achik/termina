# Reusable cold-start action: seed a game in the default scenario (from
# ${vars.scenario}) and land the browser on /play — NO matchmaking. Use after
# `use: login`. For a flow that needs a specific scenario, inline the seed
# request with an explicit `scenario:` instead (see flows/combat_log_beats.yml).
version: 1
name: new_game
steps:
  - id: seed_game
    request:
      method: POST
      url: /api/test/new-game
      # manualTick: "true" freezes the seed (no auto-loop mutating it) — use it
      # for state-assertion specs; default "false" runs the live loop.
      body:
        { scenario: "${vars.scenario}", heroSelf: "${vars.heroSelf}", seed: 1337, manualTick: "${vars.manualTick}" }
      expectStatus: 200
      assign: game
  # v1.8 (B2): baseUrl is joined AFTER ${requests…} substitution, so the
  # hook's returned absolute path ("/play?…") no longer double-slashes.
  - id: enter_game
    open: { path: "${requests.game.body.url}", waitUntil: networkidle }
  - id: wait_live
    wait: { text: "AWAITING ORDERS", timeoutMs: 20000 } # the Tick Theater header

