version: 1
project: termina-bdd
defaultEnvironment: local

# Run artifacts live under the project (gitignored). Each run writes a
# self-contained pack: run.{json,yaml,md}, agent_context.md, snapshots/,
# screenshots/, console/, network/, requests/, diagnostics/.
artifactRoot: tests/e2e/runs
retention:
  keepRuns: 20 # newest N per spec, pruned after every run

# Server lifecycle (cairntrace >= 1.11.0): cairn builds + boots the prod-preview
# server ITSELF, once for the whole invocation, then tears it down — replacing
# the bespoke scripts/e2e.mjs orchestrator. Our npm scripts pass `--cold-start`,
# which flips reuseExisting off so CI (and a cold local run) always boot fresh;
# a plain `cairn run <flow> --config …` (no --cold-start) reuses a server already
# listening on :3000 for fast local iteration.
webServer:
  cwd: ../.. # repo root, relative to this config's dir (tests/e2e)
  build: bun run build # rebuilt on every fresh boot; skipped when a server is reused
  # Flush the test Redis db (db1) BEFORE the server starts: on boot the game
  # server resumes in-progress games from db1 snapshots, so a stale seeded game
  # would come back as a zombie. `exec` hands signals straight to node for clean
  # teardown. (The command already runs under `/bin/sh -c`.)
  command: 'redis-cli -n 1 flushdb >/dev/null 2>&1 || true; exec node .output/server/index.mjs'
  url: http://127.0.0.1:3000 # readiness probe (and where specs are addressed)
  readyTimeoutMs: 90000 # prod server boot headroom (covers boot, not the build)
  env:
    HOST: "127.0.0.1" # IPv4 bind — see the baseUrl note below
    PORT: "3000"
    TERMINA_TEST_HOOKS: "1" # gate the /api/test/* seeding hooks into the prod build
    TERMINA_DISABLE_RATE_LIMIT: "1" # auth_*/parallel flows mint users from one IP — skip the 5/burst auth 429
    TERMINA_TEST_FAST_GAME: "8" # fast ticks so live-tick specs don't wait the full 4s
    NUXT_SESSION_COOKIE_SECURE: "false" # let the prod session cookie ride plain HTTP on 127.0.0.1
    NUXT_SESSION_PASSWORD: "e2e_session_password_at_least_32_chars_long"
    NUXT_REDIS_URL: "redis://localhost:6380/1" # db1 isolation; matches the flush above
    # NUXT_DATABASE_URL is intentionally NOT pinned: locally the app's compiled
    # runtimeConfig default (…localhost:5433/termina) applies; in CI the runner
    # exports its own (termina_test), and an inherited env value wins since it's
    # absent from this map.

environments:
  # Local dev: a `bun run dev` server with the dev test-hooks enabled (see
  # README.md). The hooks are the whole point — they let specs seed an
  # exact game state instead of playing a real match over the flaky lobby WS.
  local:
    # 127.0.0.1, NOT localhost: the Nuxt server binds IPv6 (::1) by default, and
    # on a Linux CI runner `localhost` can resolve to IPv4 first — so a Bun
    # `fetch` (cairn's request transport) hits a dead address and hangs. The
    # webServer block above forces an IPv4 bind (HOST=127.0.0.1) and we address
    # it as 127.0.0.1 end-to-end so browser nav + request steps all stay on IPv4.
    baseUrl: "http://127.0.0.1:3000"
    viewport: { width: 1280, height: 800 }
    vars:
      # Dev identity minted by the /api/test/login-as hook (idempotent, no OAuth).
      # `${run.token}` is a cairntrace v1.9 runtime placeholder: a unique token
      # per run, so every spec (and every parallel worker) gets its own user.
      # Termina broadcasts state per user-id over WS, so a shared user lets one
      # game loop clobber another spec's seeded state — per-run identity removes
      # that race without hand-assigning a username to each flow.
      testUser: cairn_${run.token}
      # Heroes the seeded game assigns (order = radiant then dire); see new_game action.
      heroSelf: echo
      # A scenario the dev harness knows how to seed (see README.md "Named scenarios").
      scenario: laning
      # Default to the live auto-loop; state-assertion specs override to "true".
      manualTick: "false"

  # CI runners. The `webServer` block above now boots the app (PORT=3000,
  # HOST=127.0.0.1) instead of the runner, so CI addresses the same fixed
  # IPv4 origin as local — no dynamic ${env.APP_PORT} needed. CI still exports
  # NUXT_DATABASE_URL (termina_test) into the job env, which the server inherits.
  ci:
    baseUrl: "http://127.0.0.1:3000"
    viewport: { width: 1280, height: 800 }
    vars:
      testUser: cairn_${run.token}
      heroSelf: echo
      scenario: laning

# Capture policy is set per-spec under `artifacts: { capture: ... }` (see the
# graphite samples). Defaults: screenshots on-failure, trace on-failure.

# Termina dev auth is username-based via the login-as hook, so no external
# secrets are required for the local/ci paths. For a real OAuth environment,
# capture a session once with `cairn login termina --url <oauth-start>` and use
# `session: { resume: termina }` instead of the login action.
