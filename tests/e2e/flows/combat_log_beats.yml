# Demonstrates A3 (deterministic tick advance): seed a manual-tick game (no
# auto-loop), advance N ticks via /api/test/advance, and assert — via the v1.8
# httpJson verifier — that the engine advanced exactly, plus that the combat log
# groups events under per-tick beat headers. No wall-clock waiting, no flake.
version: 1
name: combat_log_beats
intent: Advancing a seeded game's ticks deterministically drives the engine and populates per-tick
  combat-log beats.
mode: normal
# testUser inherited as cairn_${run.token} (v1.9 per-run identity).
metadata:
  feature: combat-log
  tags:
    - combat-log
    - beats
    - advance
imports:
  - ../actions/login.yml
outcomes:
  - id: log_visible
    description: the combat log is present
    verify:
      count:
        selector: '[data-testid="combat-log"]'
        equals: 1
  - id: engine_advanced
    description: the engine advanced ≥8 ticks deterministically (via the advance hook)
    verify:
      httpJson:
        url: /api/test/state?gameId=${requests.game.body.gameId}
        jsonPath: $.tick
        atLeast: 8
  - id: beats_grouped
    description: events render under per-tick "TICK N" beat headers
    verify:
      text:
        matches: TICK \d+
      region: page
steps:
  - use: login
  - id: seed_manual
    request:
      method: POST
      url: /api/test/new-game
      body:
        scenario: laning
        heroSelf: ${vars.heroSelf}
        seed: 1337
        manualTick: true
      expectStatus: 200
      assign: game
  - id: enter_game
    open:
      path: ${requests.game.body.url}
      waitUntil: networkidle
  - id: wait_live
    wait:
      text: AWAITING ORDERS
      timeoutMs: 15000
  - id: advance_ticks
    request:
      method: POST
      url: /api/test/advance
      body:
        gameId: ${requests.game.body.gameId}
        ticks: 10
      expectStatus: 200
  - id: let_client_render_beats
    wait:
      text: TICK
      timeoutMs: 10000
  - id: capture_log
    snapshot:
      interactive: true
      label: combat log after 10 advanced ticks
contractHash: sha256:e9af402cbcf2fceac13879dac0d4b957adc7f4e8ecc5cbf96bf133bc347cb897
