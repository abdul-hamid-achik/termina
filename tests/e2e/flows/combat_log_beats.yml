# Demonstrates A3 (deterministic tick advance): seed a manual-tick game (no
# auto-loop), advance N ticks via /api/test/advance, and assert — via the v1.8
# httpJson verifier — that the engine advanced exactly, plus that the combat log
# groups events under per-tick beat headers. No wall-clock waiting, no flake.
version: 1
name: combat_log_beats
intent: Advancing a seeded game's ticks populates the combat log with per-tick beat headers in the browser.
mode: normal
metadata:
  feature: combat-log
  tags:
    - combat-log
    - beats
    - advance
imports:
  - ../actions/login.yml
outcomes:
  - id: log_visible
    description: the combat log is present
    verify:
      count:
        selector: '[data-testid="combat-log"]'
        equals: 1
  - id: beats_grouped
    description: events render under per-tick "TICK N" beat headers
    verify:
      text:
        matches: TICK \d+
      region: page
steps:
  - use: login
  - id: seed_manual
    request:
      method: POST
      url: /api/test/new-game
      body:
        scenario: laning
        heroSelf: ${vars.heroSelf}
        seed: 1337
        manualTick: true
      timeoutMs: 15000
      expectStatus: 200
      assign: game
  - id: enter_game
    open:
      path: ${requests.game.body.url}
      waitUntil: domcontentloaded
  - id: wait_live
    wait:
      text: AWAITING ORDERS
      timeoutMs: 15000
  - id: advance_ticks
    request:
      method: POST
      url: /api/test/advance
      body:
        gameId: ${requests.game.body.gameId}
        ticks: 10
      timeoutMs: 15000
      expectStatus: 200
  - id: let_client_render_beats
    wait:
      text: TICK
      timeoutMs: 10000
  - id: capture_log
    snapshot:
      interactive: true
      label: combat log after 10 advanced ticks
contractHash: sha256:7ebf7dca8b0fb6e338f037099a0d9e8386687db20f4e5d074ada659d226500c1
