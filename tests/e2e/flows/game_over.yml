# Ports the deleted game-over.spec.ts. Seeds a LIVE dev game (manualTick
# "false"), then force-ends it for a RADIANT win via /api/test/force-end (the
# running GameLoop broadcasts game_over on its next ~500ms fast tick, so the
# post-game screen appears near-instantly — no minutes-long bot match). The
# original spec asserted, on ONE end screen: the victory banner, the personal
# stats labels, both team scoreboard sections, then navigated home. Cairntrace
# outcomes only see the FINAL page, and the spec's last act leaves post-game for
# "/". So the rich post-game content (victory banner, K/D/A + HERO DAMAGE +
# GOLD EARNED stats labels, both team sections) is verified with hard-fail
# `wait` gates — a missed wait fails the whole run — and the consistent
# final-state outcomes assert that MAIN MENU actually navigated home and that
# post-game is gone. NOTE: no engine httpJson cross-check — forceEndGame tears
# the game out of the live registry, so /api/test/state 404s once it ends; the
# original spec likewise asserted only on the rendered UI (engine check was
# flagged optional).
version: 1
name: game_over
intent: Force-ending a seeded live game for a radiant win shows the post-game screen with the
  victory banner, personal stats, and both team scoreboards, and MAIN MENU returns home.
mode: normal
vars:
  scenario: laning
  manualTick: "false"
  heroSelf: echo
metadata:
  feature: post-game
  tags:
    - game-over
    - post-game
    - seeded
imports:
  - ../actions/login.yml
  - ../actions/new_game.yml
outcomes:
  - id: navigated_home
    description: clicking MAIN MENU leaves post-game and lands on the home route
    verify:
      url:
        matches: /
  - id: home_rendered
    description: the public home page is shown after returning to menu
    verify:
      text:
        contains: where every command is a kill
  - id: post_game_gone
    description: the post-game victory banner is no longer on screen after navigating home
    verify:
      notText:
        contains: RADIANT VICTORY
  - id: post_game_overlay_gone
    description: the post-game screen overlay is fully unmounted after returning to menu
    verify:
      count:
        selector: '[data-testid="post-game"]'
        equals: 0
  - id: home_enter_terminal_link
    description: the home page is interactive again (the ENTER THE TERMINAL link to /lobby is present)
    verify:
      count:
        selector: a[href="/lobby"]
        atLeast: 1
steps:
  - use: login
  - use: new_game
  - id: force_end
    request:
      method: POST
      url: /api/test/force-end
      body:
        gameId: ${requests.game.body.gameId}
        winner: radiant
      expectStatus: 200
      timeoutMs: 15000
      assign: ended
  - id: wait_post_game
    wait:
      text: RADIANT VICTORY
      timeoutMs: 30000
  - id: wait_kda
    wait:
      text: K/D/A
      timeoutMs: 10000
  - id: wait_hero_damage
    wait:
      text: HERO DAMAGE
      timeoutMs: 10000
  - id: wait_gold_earned
    wait:
      text: GOLD EARNED
      timeoutMs: 10000
  - id: wait_dire_section
    wait:
      text: DIRE
      timeoutMs: 10000
  - id: capture_post_game
    snapshot:
      interactive: true
      label: post-game screen after radiant force-end
  - id: return_to_menu
    click:
      by: selector
      selector: '[data-testid="return-to-menu-btn"]'
  - id: wait_home
    wait:
      text: where every command is a kill
      timeoutMs: 10000
contractHash: sha256:324c039e8ce19df2fe5bac9a3fa4fbf06c13d471feb8897879fb3abd9fc5f87d
