version: 1
name: nav_heroes
intent: The public /heroes training console renders a hero's kit + the cast console, and casting the
  Q ability (clicking the Q slot) prints the resolved outcome to the terminal log.
mode: normal
metadata:
  feature: heroes
  tags:
    - heroes
    - public
    - training
outcomes:
  - id: console_renders
    description: the training console renders (advance-tick control present)
    verify:
      text:
        contains: ADVANCE TICK
  - id: cast_prints_to_log
    description: casting the Q ability prints a "casts" line to the log
    verify:
      text:
        contains: casts
  - id: combo_casts_full_rotation
    description: the CAST COMBO control fires the kit's rotation and logs the combo result
    verify:
      text:
        contains: combo landed
  - id: role_filter_narrows_roster
    description: the role filter narrows the hero grid to only that role
    verify:
      script:
        run: |
          const picks = Array.from(document.querySelectorAll('[data-testid="hero-pick"]'));
          const roles = [...new Set(picks.map((b) => b.getAttribute('data-role')))];
          return {
            ok: picks.length > 0 && roles.length === 1 && roles[0] === 'support',
            evidence: picks.length + ' heroes shown, roles: ' + JSON.stringify(roles),
          };
  - id: role_filter_shows_blurb
    description: filtering to a role shows that role's teaching blurb
    verify:
      text:
        contains: Enable the team
  - id: playstyle_tags_render
    description: the selected hero's kit-identity playstyle tags render
    verify:
      script:
        run: >
          const row = document.querySelector('[data-testid="hero-playstyle"]');

          const chips = row ? Array.from(row.querySelectorAll('span')).map((s) =>
          s.textContent.trim()).filter(Boolean) : [];

          return { ok: chips.length > 0, evidence: 'tags: ' + JSON.stringify(chips) };
  - id: playstyle_filter_narrows_roster
    description: the playstyle filter further narrows the grid to heroes carrying that tag
    verify:
      script:
        run: |
          const picks = Array.from(document.querySelectorAll('[data-testid="hero-pick"]'));
          const allMobility = picks.length > 0 && picks.every((b) =>
            (b.getAttribute('data-playstyle') || '').split(',').includes('Mobility'));
          return {
            ok: allMobility,
            evidence: picks.length + ' heroes shown; all carry Mobility: ' + allMobility,
          };
steps:
  - id: open_heroes
    open:
      path: /heroes
      waitUntil: domcontentloaded
  - id: wait_for_console
    wait:
      text: HERO TRAINING
      timeoutMs: 10000
  - id: filter_support
    click:
      by: selector
      selector: '[data-testid="role-filter-support"]'
  - id: settle_filter
    wait:
      text: SUPPORT
      timeoutMs: 10000
  - id: filter_mobility
    click:
      by: selector
      selector: '[data-testid="playstyle-filter-Mobility"]'
  - id: settle_playstyle
    wait:
      text: Proxy
      timeoutMs: 10000
  - id: cast_q
    click:
      by: selector
      selector: '[data-testid="ability-q"]'
  - id: await_cast_log
    wait:
      text: casts
      timeoutMs: 10000
  - id: cast_combo
    click:
      by: role
      role: button
      name: "[ CAST COMBO (C) ]"
      exact: true
  - id: await_combo_log
    wait:
      text: combo landed
      timeoutMs: 10000
contractHash: sha256:6c72a82058956862ee27a7a4905960636368e672971974fe855e76bf11faf718
