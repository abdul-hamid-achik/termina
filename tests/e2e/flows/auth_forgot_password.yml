version: 1
name: auth_forgot_password
intent: A logged-out user can open /forgot-password, enter a username, and submit the reset request.
  The page then shows the neutral "a reset link is on its way" confirmation regardless of whether
  the account exists (no account enumeration). No email is required for the UI journey.
mode: normal
metadata:
  feature: auth
  tags:
    - auth
    - public
    - password-reset
outcomes:
  - id: confirmation_shown_after_submit
    description: after submitting, the neutral reset-sent confirmation is shown
    verify:
      text:
        contains: on its way
  - id: form_gone_after_submit
    description: the username form is replaced by the confirmation
    verify:
      count:
        selector: input[autocomplete="username"]
        equals: 0
steps:
  - id: open_forgot
    open:
      path: /forgot-password
      waitUntil: domcontentloaded
  - id: await_form
    wait:
      text: recover access
      timeoutMs: 10000
  - id: fill_username
    fill:
      by: selector
      selector: input[autocomplete="username"]
      value: anyuser
  - id: submit
    click:
      by: role
      role: button
      name: "[ SEND RESET LINK ]"
      exact: true
  - id: await_confirmation
    wait:
      text: on its way
      timeoutMs: 10000
contractHash: sha256:59114f46bf0f616c418be80957b160ea30ccf9e4489d473ff09d7bb8699a0204
