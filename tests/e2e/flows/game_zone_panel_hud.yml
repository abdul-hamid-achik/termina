version: 1
name: game_zone_panel_hud
intent: >
  A seeded in-game HUD keeps the Zone panel visible in the left column while HUD presets change.
  Tactical mode moves the map to center and demotes the combat log to the rail; Focus mode turns on
  vitals emphasis without dimming the Zone panel. The same game screen also keeps Zone and War Room
  usable at tablet (1024px) and narrow mobile (640px) widths.
mode: normal
vars:
  scenario: laning_combat
  manualTick: "true"
  heroSelf: echo
metadata:
  feature: game-screen
  tags:
    - game-screen
    - zone-panel
    - hud-settings
    - responsive
imports:
  - ../actions/login.yml
outcomes:
  - id: zone_panel_left_column
    description: the Zone panel renders in the left column above War Room
    verify:
      count:
        selector: .game-grid__war [data-testid="zone-panel"]
        equals: 1
  - id: zone_panel_not_in_rail
    description: the Zone panel is not inside the right rail, where it previously collapsed
    verify:
      count:
        selector: .game-grid__rail [data-testid="zone-panel"]
        equals: 0
  - id: focus_vitals_dim_war_room_only
    description: Focus preset dims the War Room but keeps the Zone panel fully legible
    verify:
      script:
        run: >
          const root = document.querySelector('[data-testid="game-screen"]'); const zone =
          document.querySelector('.game-grid__war [data-testid="zone-panel"]'); const warShell =
          document.querySelector('.game-grid__warroom'); const warRoom =
          document.querySelector('[data-testid="war-room"]'); const zoneRect = zone ?
          zone.getBoundingClientRect() : null; const warRect = warRoom ?
          warRoom.getBoundingClientRect() : null; const zoneOpacity = zone ?
          getComputedStyle(zone).opacity : null; const warOpacity = warShell ?
          getComputedStyle(warShell).opacity : null; const ok = !!root &&
          root.getAttribute('data-vitals') === 'on' && !!zone && !!warRoom &&
            !!zoneRect && zoneRect.height > 40 && !!warRect && warRect.height > 40 &&
            Number(zoneOpacity) >= 0.99 && Number(warOpacity) < 0.8 &&
            zoneRect.bottom <= warRect.top + 8;
          return {
            ok,
            evidence: {
              dataVitals: root && root.getAttribute('data-vitals'),
              zoneRect,
              warRect,
              zoneOpacity,
              warOpacity,
            },
          };
  - id: focus_banner_visible
    description: Focus preset renders the action focus banner
    verify:
      count:
        selector: '[data-testid="focus-banner"]'
        equals: 1
  - id: responsive_zone_and_war_room_usable
    description: tablet and mobile-width in-game renders keep Zone and War Room visible without page overflow
    verify:
      script:
        run: >
          return (async () => {
            const widths = [1024, 640];
            const results = {};
            const failures = [];
            const waitFor = (doc, selector, timeoutMs = 10000) =>
              new Promise((resolve) => {
                const started = Date.now();
                const tick = () => {
                  const el = doc.querySelector(selector);
                  if (el) return resolve(el);
                  if (Date.now() - started > timeoutMs) return resolve(null);
                  setTimeout(tick, 100);
                };
                tick();
              });
            for (const width of widths) {
              const frame = document.createElement('iframe');
              frame.style.cssText =
                'position:fixed;left:0;top:0;border:0;width:' + width + 'px;height:760px;z-index:-1;opacity:0';
              document.body.appendChild(frame);
              await new Promise((resolve) => {
                frame.addEventListener('load', () => resolve(), { once: true });
                frame.contentWindow.location.href = window.location.href;
              });
              const doc = frame.contentDocument;
              await waitFor(doc, '[data-testid="zone-panel"]');
              await waitFor(doc, '[data-testid="war-room"]');
              const win = frame.contentWindow;
              const zone = doc.querySelector('.game-grid__war [data-testid="zone-panel"]');
              const railZone = doc.querySelector('.game-grid__rail [data-testid="zone-panel"]');
              const warRoom = doc.querySelector('[data-testid="war-room"]');
              const zoneRect = zone ? zone.getBoundingClientRect() : null;
              const warRect = warRoom ? warRoom.getBoundingClientRect() : null;
              const scrollWidth = doc.documentElement.scrollWidth;
              const innerWidth = win.innerWidth;
              const result = {
                innerWidth,
                scrollWidth,
                zoneHeight: zoneRect && zoneRect.height,
                warHeight: warRect && warRect.height,
                railHasZone: !!railZone,
              };
              results[width] = result;
              if (innerWidth !== width) failures.push(width + 'px frame rendered at ' + innerWidth + 'px');
              if (!zone || !zoneRect || zoneRect.height <= 32) failures.push(width + 'px Zone panel missing/collapsed');
              if (railZone) failures.push(width + 'px Zone panel returned to the rail');
              if (!warRoom || !warRect || warRect.height <= 32) failures.push(width + 'px War Room missing/collapsed');
              if (scrollWidth > innerWidth + 2) failures.push(width + 'px horizontal overflow: ' + scrollWidth + ' > ' + innerWidth);
              frame.remove();
            }
            return { ok: failures.length === 0, evidence: { results, failures } };
          })();
  - id: clean_console
    description: changing HUD presets and rendering the game produces no console errors
    verify:
      console:
        errorsMax: 0
steps:
  - use: login
  - id: open_settings_for_tactical
    open:
      path: /profile/settings
      waitUntil: domcontentloaded
  - id: wait_hud_settings
    wait:
      text: HUD & DISPLAY
      timeoutMs: 10000
  - id: apply_tactical_preset
    click:
      by: selector
      selector: '[data-testid="hud-preset-tactical"]'
  - id: wait_tactical_active
    wait:
      text: ▸ Tactical
      timeoutMs: 5000
  - id: seed_manual_laning_combat
    request:
      method: POST
      url: /api/test/new-game
      body:
        scenario: ${vars.scenario}
        heroSelf: ${vars.heroSelf}
        seed: 12046
        manualTick: ${vars.manualTick}
      timeoutMs: 15000
      expectStatus: 200
      assign: game
  - id: enter_tactical_game
    open:
      path: ${requests.game.body.url}
      waitUntil: domcontentloaded
  - id: wait_tactical_live
    wait:
      text: AWAITING ORDERS
      timeoutMs: 15000
  - id: wait_tactical_map_center
    wait:
      text: TACTICAL MAP
      timeoutMs: 10000
  - id: capture_tactical
    snapshot:
      interactive: true
      label: tactical preset keeps Zone panel visible
  - id: open_settings_for_focus
    open:
      path: /profile/settings
      waitUntil: domcontentloaded
  - id: wait_hud_settings_focus
    wait:
      text: HUD & DISPLAY
      timeoutMs: 10000
  - id: apply_focus_preset
    click:
      by: selector
      selector: '[data-testid="hud-preset-focus"]'
  - id: wait_focus_active
    wait:
      text: ▸ Focus
      timeoutMs: 5000
  - id: seed_focus_manual_laning_combat
    request:
      method: POST
      url: /api/test/new-game
      body:
        scenario: ${vars.scenario}
        heroSelf: ${vars.heroSelf}
        seed: 12047
        manualTick: ${vars.manualTick}
      timeoutMs: 15000
      expectStatus: 200
      assign: focusGame
  - id: return_to_focus_game
    open:
      path: ${requests.focusGame.body.url}
      waitUntil: domcontentloaded
  - id: wait_focus_live
    wait:
      text: AWAITING ORDERS
      timeoutMs: 15000
  - id: capture_focus
    snapshot:
      interactive: true
      label: focus preset dims War Room but not Zone panel
contractHash: sha256:dae172e8a4c2aefc29ebe1bf5b31bff3f735df8b2242de9e9b298a752abe83e8
