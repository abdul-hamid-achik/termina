# A HUMAN ability cast resolves through a tick. Seeds the laning_combat scenario
# (human levelled to 6 with full mana mid-lane), queues a real self-buff cast
# (echo W — Phase Shift) via the /api/test/action hook, advances one tick, then a
# script verifier reads /api/test/state and confirms the W cooldown is now set
# (proof the cast resolved). Engine truth for the same path lives in
# tests/unit/engine/PlayerActionResolution.test.ts.
version: 1
name: game_cast_self_buff
intent: Casting a self-buff ability via a human action resolves through a tick — the ability goes on
  cooldown in engine state.
mode: normal
vars:
  scenario: laning_combat
  manualTick: "true"
  heroSelf: echo
metadata:
  feature: abilities
  tags:
    - abilities
    - cast
    - seeded
    - action-hook
imports:
  - ../actions/login.yml
outcomes:
  - id: w_on_cooldown
    description: engine state shows the human's W ability on cooldown after the cast + tick
    verify:
      script:
        run: >
          const params = new URLSearchParams(window.location.search); const gameId =
          params.get('gameId'); const playerId = params.get('playerId'); return
          fetch('/api/test/state?gameId=' + encodeURIComponent(gameId), { credentials: 'include'
          }).then((r) => r.json()).then((s) => { const p = s.players && s.players[playerId]; const
          cd = p && p.cooldowns ? p.cooldowns.w : 0; return { ok: cd > 0, evidence: 'cooldowns=' +
          JSON.stringify(p && p.cooldowns) + ' buffs=' + (p && p.buffs ? p.buffs.length : 0) }; });
steps:
  - use: login
  - id: seed_manual
    request:
      method: POST
      url: /api/test/new-game
      body:
        scenario: laning_combat
        heroSelf: ${vars.heroSelf}
        seed: 1337
        manualTick: true
      timeoutMs: 15000
      expectStatus: 200
      assign: game
  - id: enter_game
    open:
      path: ${requests.game.body.url}
      waitUntil: domcontentloaded
  - id: wait_live
    wait:
      text: AWAITING ORDERS
      timeoutMs: 15000
  - id: cast_w
    request:
      method: POST
      url: /api/test/action
      body:
        gameId: ${requests.game.body.gameId}
        playerId: ${requests.game.body.playerId}
        command:
          type: cast
          ability: w
      timeoutMs: 15000
      expectStatus: 200
  - id: advance_one
    request:
      method: POST
      url: /api/test/advance
      body:
        gameId: ${requests.game.body.gameId}
        ticks: 1
      timeoutMs: 15000
      expectStatus: 200
  - id: capture
    snapshot:
      interactive: true
      label: hero status after casting W
contractHash: sha256:98f2f2aabc7e604fb555e1bee7c2f80fea5af7f682d3459906e289a5208daee4
