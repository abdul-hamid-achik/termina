# The draft→game handoff, end to end and deterministically: seed a draft frozen
# at the player's FINAL pick (via /api/test/new-draft, prepick: 9 → the human is
# the last picker), select + CONFIRM a hero, and let the REAL pipeline run — the
# remaining picks complete, the lobby publishes matchmaking:game_ready, the game
# server creates the game and sends game_starting, and the client navigates to
# /play. Asserts the in-game screen + panels mounted. No live matchmaking/WS race.
version: 1
name: lobby_matchmaking_to_game
intent: Completing a seeded hero draft (the player makes the final pick and confirms) starts the
  match and lands the player on the in-game screen with the core panels mounted.
mode: normal
metadata:
  feature: lobby-draft
  tags:
    - lobby
    - matchmaking
    - draft-to-game
    - seeded
imports:
  - ../actions/login.yml
outcomes:
  - id: reached_play
    description: the client navigated to the in-game route after the draft completed
    verify:
      url:
        matches: /play
  - id: game_screen_present
    description: the in-game screen mounted after the draft handed off to a real game
    verify:
      count:
        selector: '[data-testid="game-screen"]'
        equals: 1
  - id: state_bar_present
    description: the game state bar renders
    verify:
      count:
        selector: '[data-testid="game-state-bar"]'
        equals: 1
  - id: map_present
    description: the ascii map renders
    verify:
      count:
        selector: '[data-testid="ascii-map"]'
        equals: 1
  - id: combat_log_present
    description: the combat log renders
    verify:
      count:
        selector: '[data-testid="combat-log"]'
        equals: 1
steps:
  - use: login
  - id: seed_draft
    request:
      method: POST
      url: /api/test/new-draft
      body:
        prepick: 9
      expectStatus: 200
      assign: draft
  - id: enter_lobby
    open:
      path: /lobby
      waitUntil: load
  - id: wait_my_turn
    wait:
      text: YOUR TURN TO PICK
      timeoutMs: 15000
  - id: select_hero
    click:
      by: selector
      selector: '[data-testid="hero-card-cache"]'
  - id: confirm_pick
    click:
      by: role
      role: button
      name: "[ CONFIRM ]"
  - id: wait_in_game
    wait:
      text: AWAITING ORDERS
      timeoutMs: 30000
  - id: capture
    snapshot:
      interactive: true
      label: in-game screen after completing the seeded draft
contractHash: sha256:8f2854a8123bd0e23581369337b7e3f99bf9c5ea7a77bf96ed583ca6495e6cf5
