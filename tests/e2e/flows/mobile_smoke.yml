version: 1
name: mobile_smoke
intent: >
  On a phone viewport (390x844) the core unauthenticated entry path renders. The landing page shows
  the tagline and both call-to-action labels ("ENTER THE TERMINAL", "LEARN COMMANDS") at phone
  width, and the /login page renders the credentials form (username + password inputs), the
  login/register tab switcher, and the GitHub OAuth button. (The landing SSR markup itself is
  covered by component tests; this flow is the real-390px-viewport render check.) The
  authenticated-lobby leg of the original spec is covered separately and is intentionally not
  exercised here. No login required.
mode: normal
viewport:
  width: 390
  height: 844
metadata:
  feature: mobile
  tags:
    - mobile
    - smoke
    - landing
    - login
    - public
outcomes:
  - id: login_form_renders
    description: the /login page shows a username input and a password input on the phone viewport
    verify:
      count:
        selector: input[autocomplete="username"], form input[type="password"]
        equals: 2
  - id: login_tabs_render
    description: the login/register tab switcher is rendered on the phone viewport
    verify:
      text:
        contains: "> REGISTER"
  - id: login_oauth_renders
    description: the GitHub OAuth button is rendered on the phone viewport
    verify:
      text:
        contains: CONTINUE WITH GITHUB
steps:
  - id: open_landing
    open:
      path: /
      waitUntil: domcontentloaded
  - id: await_tagline
    wait:
      text: where every command is a kill
      timeoutMs: 10000
  - id: assert_enter_terminal_label
    wait:
      text: ENTER THE TERMINAL
      timeoutMs: 10000
  - id: assert_learn_commands_label
    wait:
      text: LEARN COMMANDS
      timeoutMs: 10000
  - id: open_login
    open:
      path: /login
      waitUntil: domcontentloaded
  - id: await_login
    wait:
      text: authenticate to continue
      timeoutMs: 10000
  - id: await_login_tab
    wait:
      text: "> LOGIN"
      timeoutMs: 10000
  - id: await_register_tab
    wait:
      text: "> REGISTER"
      timeoutMs: 10000
  - id: await_github_oauth
    wait:
      text: CONTINUE WITH GITHUB
      timeoutMs: 10000
contractHash: sha256:c24a1412e206fab49cf0fe68e610092d2e0dbd761c91bcde0a1bf127fe84ca10
