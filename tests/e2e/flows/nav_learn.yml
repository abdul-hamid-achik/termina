version: 1
name: nav_learn
intent: The public /learn guide renders its core sections (Quick Start Guide, Command Reference,
  Game Concepts), the command reference lists the key player commands, and the closing CTA buttons
  link to /lobby and /leaderboard.
mode: normal
metadata:
  feature: navigation
  tags:
    - learn
    - public
    - navigation
outcomes:
  - id: quick_start_section_renders
    description: the Quick Start Guide panel renders
    verify:
      text:
        contains: QUICK START GUIDE
  - id: command_reference_section_renders
    description: the Command Reference panel renders
    verify:
      text:
        contains: COMMAND REFERENCE
  - id: game_concepts_section_renders
    description: the Game Concepts panel renders
    verify:
      text:
        contains: GAME CONCEPTS
  - id: command_reference_lists_commands
    description: the command reference lists the core commands move/attack/cast/buy
    verify:
      script:
        run: >
          const want = ['move <zone>', 'attack [target]', 'cast <q|w|e|r> [target]', 'buy <item>'];

          const cells = Array.from(document.querySelectorAll('th, td')).map(c =>
          c.textContent.trim());

          const missing = want.filter(t => !cells.includes(t));

          return { ok: missing.length === 0, evidence: missing.length ? 'missing: ' +
          missing.join(', ') : 'all present: ' + want.join(', ') };
  - id: command_table_has_caption
    description: the command reference table is captioned for screen readers
    verify:
      script:
        run: >
          const caps = Array.from(document.querySelectorAll('caption')).map(c =>
          c.textContent.trim());

          const ok = caps.some(t => /command reference/i.test(t));

          return { ok, evidence: 'captions: ' + JSON.stringify(caps) };
  - id: cta_links_play_and_practice
    description: the closing CTA links to /lobby (ENTER THE TERMINAL) and offers PRACTICE VS BOTS
    verify:
      script:
        run: >
          const enter = Array.from(document.querySelectorAll('a')).find(a => /ENTER THE
          TERMINAL/i.test(a.textContent));

          const enterHref = enter && enter.getAttribute('href');

          const practice = document.querySelector('[data-testid="start-tutorial"]');

          return {
            ok: enterHref === '/lobby' && !!practice,
            evidence: 'ENTER THE TERMINAL -> ' + JSON.stringify(enterHref) + ' | practice button: ' + !!practice,
          };
  - id: map_primer_renders
    description: the interactive map primer renders in the Movement panel
    verify:
      text:
        contains: Explore the Map
  - id: map_primer_hop_updates_caption
    description: clicking an adjacent zone hops the explorer there and updates the caption
    verify:
      script:
        run: >
          const cap = document.querySelector('[data-testid="map-primer-caption"]');

          const t = cap ? cap.textContent : '';

          return { ok: /Radiant Base/.test(t), evidence: 'caption after hop: ' + JSON.stringify(t)
          };
steps:
  - id: open_learn
    open:
      path: /learn
      waitUntil: domcontentloaded
  - id: wait_for_command_reference
    wait:
      text: COMMAND REFERENCE
      timeoutMs: 10000
  - id: wait_for_map_primer
    wait:
      text: Explore the Map
      timeoutMs: 10000
  - id: hop_to_base
    click:
      by: selector
      selector: '[data-zone-cell="radiant-base"]'
  - id: await_hop_caption
    wait:
      text: Standing in Radiant Base
      timeoutMs: 10000
contractHash: sha256:71f1eb204e934e3172d31842399b6ed82c674416990210a57c71f25313b9758c
