# Seeds a real dev game (default laning scenario) and asserts the InventoryBar
# in the command strip renders exactly 6 slots, all empty ("--") at game start.
# Ported from the deleted Playwright spec tests/e2e/specs/game/inventory.spec.ts.
# The original "purchased items appear" case is dropped: it needs gold + a buy
# command resolving over live ticks (non-deterministic timing), so only the
# stable empty-slots subset is captured here.
version: 1
name: game_inventory
intent: A freshly seeded game shows the inventory bar with exactly six empty slots.
mode: normal
metadata:
  feature: inventory
  tags:
    - inventory
    - game-screen
    - seeded
imports:
  - ../actions/login.yml
  - ../actions/new_game.yml
outcomes:
  - id: six_inventory_slots
    description: the inventory bar renders exactly 6 slots
    verify:
      count:
        selector: '[data-testid^="inventory-slot-"]'
        equals: 6
  - id: first_slot_empty
    description: the first inventory slot reads empty ("--") at game start
    verify:
      text:
        contains: --
        region: '[data-testid="inventory-slot-0"]'
  - id: last_slot_empty
    description: the sixth (last) inventory slot also reads empty at game start
    verify:
      text:
        contains: --
        region: '[data-testid="inventory-slot-5"]'
steps:
  - use: login
  - use: new_game
  - id: capture_inventory
    snapshot:
      interactive: true
      label: inventory bar at game start
contractHash: sha256:b025a373ac9923379cc79c8c65c4d859262a9dc63ae6bb024b5c13e20f46820d
