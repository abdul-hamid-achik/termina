# Seeds a real dev game (default scenario) and asserts the overhauled in-game
# screen renders. VERIFIED GREEN end-to-end (5/5, ~12s, no matchmaking) against a
# dev server with TERMINA_TEST_HOOKS=1. Run:
#   cairn run tests/bdd/flows/game_screen_renders.yml --config tests/bdd/cairntrace.config.yml --cold-start
version: 1
name: game_screen_renders
intent: A seeded dev game renders the Tick Theater, War Room, and macro strip with no console errors.
mode: normal
# testUser is inherited from the environment as cairn_${run.token} (v1.9 per-run
# identity) — no per-flow username needed for isolation.
metadata:
  feature: in-game-screen
  tags:
    - game-screen
    - overhaul
    - smoke
imports:
  - ../actions/login.yml
  - ../actions/new_game.yml
outcomes:
  - id: theater_present
    description: the center combat-log "Tick Theater" is visible
    verify:
      count:
        selector: '[data-testid="combat-log"]'
        equals: 1
  - id: theater_header_present
    description: the tick countdown header is visible
    verify:
      count:
        selector: '[data-testid="theater-header"]'
        equals: 1
  - id: war_room_present
    description: the War Room dashboard is visible
    verify:
      count:
        selector: '[data-testid="war-room"]'
        equals: 1
  - id: macro_strip_present
    description: the always-on macro strip (team score / net worth / towers / Core HP) is visible
    verify:
      count:
        selector: '[data-testid="macro-strip"]'
        equals: 1
  - id: clean_console
    description: the game screen loads with no console errors
    verify:
      console:
        errorsMax: 0
steps:
  - use: login
  - use: new_game
  - id: capture_screen
    snapshot:
      interactive: true
      label: in-game screen after seed
contractHash: sha256:56220533e9bb3628e1ca0cdee90dc2fa7bd3487329ee2aedea20ed10d178cf9a
