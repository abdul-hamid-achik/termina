# Ports the deleted Playwright spec specs/game/chat.spec.ts into one Cairntrace
# flow. Chat is sent through the in-game command prompt ("chat team <msg>") and
# round-trips over the WebSocket: the server broadcasts the chat back to every
# connection, and the client renders it into the combat log as a system
# log-event tagged with the channel — "[SYS] [TEAM] <playerId>: <msg>".
#
# Chat is INSTANT (a `{type:'chat'}` WS broadcast in server/routes/ws.ts), NOT
# tick-gated — it does not flow through the action queue, so no /api/test/advance
# is needed. A frozen manualTick laning game gives a stable, alive screen with a
# live WS connection (new_game waits for "AWAITING ORDERS" after the socket
# connects). The message round-trips back to the sender's own combat log.
#
# The send is gated behind a hard `wait` STEP on the log-event surfacing, so a
# missed round-trip hard-fails the run; the stable end-state (a single log-event
# carrying BOTH the message text and the [TEAM] tag) lands in the outcomes.
version: 1
name: game_chat
intent: Sending "chat team <message>" through the command prompt round-trips over the WebSocket and
  lands in the combat log as a single TEAM-tagged log-event.
mode: normal
vars:
  scenario: laning
  manualTick: "true"
metadata:
  feature: chat
  tags:
    - chat
    - command-input
    - combat-log
    - seeded
imports:
  - ../actions/login.yml
  - ../actions/new_game.yml
outcomes:
  - id: combat_log_present
    description: the combat log renders
    verify:
      count:
        selector: '[data-testid="combat-log"]'
        equals: 1
  - id: chat_message_in_log
    description: the sent chat message appears in the combat log
    verify:
      text:
        contains: hello from e2e
        region: '[data-testid="combat-log"]'
  - id: chat_tagged_team
    description: the chat log-event is tagged with the TEAM channel
    verify:
      text:
        contains: "[TEAM]"
        region: '[data-testid="combat-log"]'
  - id: single_log_event_carries_both
    description: a single combat-log entry carries both the message text and the [TEAM] tag
    verify:
      script:
        run: >
          const events = Array.from(document.querySelectorAll('[data-testid="combat-log"]
          [data-testid="log-event"]')); const hit = events.find((e) => (e.textContent ||
          '').includes('hello from e2e') && (e.textContent || '').includes('[TEAM]')); return { ok:
          !!hit, evidence: hit ? ('matched: ' + hit.textContent.trim()) : ('no log-event with both;
          events=' + events.length) };
steps:
  - use: login
  - use: new_game
  - id: send_team_chat
    batch:
      - fill:
          by: selector
          selector: '[data-testid="command-input-field"]'
          value: chat team hello from e2e
      - press: Enter
  - id: wait_chat_round_trip
    wait:
      text: hello from e2e
      timeoutMs: 10000
  - id: capture_log
    snapshot:
      interactive: true
      label: combat log after team chat round-trip
contractHash: sha256:40ab2b2b5bdcdd8a27b785581e6d4ca92392a640594796104e47d526ea9e8ede
