version: 1
name: lobby_queue
intent: >
  The /lobby Matchmaking panel shows a FIND MATCH control while idle. Clicking it enters the
  searching state, rendering the MatchQueue (data-testid match-queue) with an "N/10 Players Found"
  header and a CANCEL control. Clicking CANCEL returns the lobby to idle with FIND MATCH visible
  again. This covers the idle to searching to cancel UI journey for a solo-queued dev user. (The
  /api/queue/join and /api/queue/leave status contracts are covered by the hitspec API suite.) Match
  completion (hero-pick draft and match-to-game handoff) is driven by the matchmaker over WebSocket
  and is NOT exercised here, as there is no dev hook to seed a draft state.
mode: normal
vars:
  testUser: cairn_${run.token}
metadata:
  feature: lobby
  tags:
    - lobby
    - queue
    - matchmaking
    - partial
imports:
  - ../actions/login.yml
outcomes:
  - id: find_match_visible_after_cancel
    description: after cancelling the queue the lobby returns to idle with the FIND MATCH control visible
    verify:
      text:
        contains: FIND MATCH
  - id: match_queue_gone
    description: the MatchQueue searching panel is no longer present after cancelling
    verify:
      count:
        selector: '[data-testid="match-queue"]'
        equals: 0
steps:
  - id: auth
    use: login
  - id: open_lobby
    open:
      path: /lobby
      waitUntil: domcontentloaded
  - id: await_find_match
    wait:
      text: FIND MATCH
      timeoutMs: 10000
  - id: click_find_match
    click:
      by: role
      role: button
      name: "[ FIND MATCH ]"
      exact: true
  - id: await_searching
    wait:
      text: Players Found
      timeoutMs: 10000
  - id: click_cancel
    click:
      by: role
      role: button
      name: "[ CANCEL ]"
      exact: true
  - id: await_idle
    wait:
      text: FIND MATCH
      timeoutMs: 10000
contractHash: sha256:33fa5ff487c4a07d92791cd0876cd00fb79d2977352ca458ecd52a4bc2e98481
