# A HUMAN basic attack lands on a co-located enemy. Seeds laning_combat (human +
# the first dire bot, bot_d0_<gameId>, co-located mid-lane), queues a real
# `attack` on that bot via the /api/test/action hook, advances one tick, then a
# script verifier reads /api/test/state and confirms the human's damageDealt is
# now > 0 (a regen-independent "the hit landed" signal; raw enemy HP is confounded
# by per-tick regen + the level-6 maxHp recompute). Engine truth for the same
# path lives in tests/unit/engine/PlayerActionResolution.test.ts.
version: 1
name: game_attack_lands
intent: Attacking a co-located enemy via a human action resolves through a tick — the attacker deals
  hero damage in engine state.
mode: normal
vars:
  scenario: laning_combat
  manualTick: "true"
  heroSelf: echo
metadata:
  feature: combat
  tags:
    - combat
    - attack
    - seeded
    - action-hook
imports:
  - ../actions/login.yml
outcomes:
  - id: damage_dealt
    description: engine state shows the human dealt hero damage after the attack + tick
    verify:
      script:
        run: >
          const params = new URLSearchParams(window.location.search); const gameId =
          params.get('gameId'); const playerId = params.get('playerId'); return
          fetch('/api/test/state?gameId=' + encodeURIComponent(gameId), { credentials: 'include'
          }).then((r) => r.json()).then((s) => { const p = s.players && s.players[playerId]; const
          dd = p ? p.damageDealt : 0; return { ok: dd > 0, evidence: 'damageDealt=' + dd }; });
steps:
  - use: login
  - id: seed_manual
    request:
      method: POST
      url: /api/test/new-game
      body:
        scenario: laning_combat
        heroSelf: ${vars.heroSelf}
        seed: 1337
        manualTick: true
      timeoutMs: 15000
      expectStatus: 200
      assign: game
  - id: enter_game
    open:
      path: ${requests.game.body.url}
      waitUntil: domcontentloaded
  - id: wait_live
    wait:
      text: AWAITING ORDERS
      timeoutMs: 15000
  - id: attack_enemy
    request:
      method: POST
      url: /api/test/action
      body:
        gameId: ${requests.game.body.gameId}
        playerId: ${requests.game.body.playerId}
        command:
          type: attack
          target:
            kind: hero
            name: bot_d0_${requests.game.body.gameId}
      timeoutMs: 15000
      expectStatus: 200
  - id: advance_one
    request:
      method: POST
      url: /api/test/advance
      body:
        gameId: ${requests.game.body.gameId}
        ticks: 1
      timeoutMs: 15000
      expectStatus: 200
  - id: capture
    snapshot:
      interactive: true
      label: combat after attacking the co-located enemy
contractHash: sha256:77484d3f34bec22e977efe41bd48a7f75fce78a2e4ead540a70081809312ed1e
