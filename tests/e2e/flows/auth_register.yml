version: 1
name: auth_register
intent: >
  The /login Register tab reveals a confirm-password field and drives inline validation: a too-short
  username warns "must be 3-20 characters", a too-short password shows the "/8 chars required" hint,
  and a mismatched confirmation shows "passwords do not match". (The /api/auth/register success +
  validation status contracts are covered by the hitspec API suite.)
mode: normal
metadata:
  feature: auth
  tags:
    - auth
    - register
    - validation
    - login-page
outcomes:
  - id: confirm_password_revealed
    description: switching to the Register tab reveals a confirm-password field (a second password input)
    verify:
      count:
        selector: form input[type="password"]
        equals: 2
  - id: username_too_short_hint
    description: a 2-char username triggers the "must be 3-20 characters" inline hint
    verify:
      text:
        contains: must be 3-20 characters
  - id: password_too_short_hint
    description: a 5-char password shows the "/8 chars required" inline hint
    verify:
      text:
        contains: /8 chars required
  - id: confirm_mismatch_hint
    description: a confirm value that differs from the password shows "passwords do not match"
    verify:
      text:
        contains: passwords do not match
steps:
  - id: open_login
    open:
      path: /login
      waitUntil: domcontentloaded
  - id: switch_to_register
    click:
      by: role
      role: button
      name: "> REGISTER"
  - id: type_short_username
    fill:
      by: selector
      selector: input[autocomplete="username"]
      value: ab
  - id: see_username_hint
    wait:
      text: must be 3-20 characters
      timeoutMs: 5000
  - id: type_short_password
    fill:
      by: selector
      selector: form > div:nth-child(2) input
      value: short
  - id: see_password_hint
    wait:
      text: /8 chars required
      timeoutMs: 5000
  - id: type_mismatch_confirm
    fill:
      by: selector
      selector: form > div:nth-child(3) input
      value: different
  - id: see_mismatch_hint
    wait:
      text: passwords do not match
      timeoutMs: 5000
contractHash: sha256:b3d27e59c09df4de19d25edea73434d08b96af28f0c927495b6a06b013379928
